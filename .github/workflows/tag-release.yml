name: Release on tag push

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write  # Required for OIDC authentication with Azure

jobs:
  build:
    # Skip tags pushed by the Dependabot release automation — that workflow
    # handles its own release creation via softprops/action-gh-release.
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    env:
      # Signing is skipped when the Azure Trusted Signing secrets are not configured.
      SIGN_ENABLED: ${{ secrets.AZURE_CODE_SIGNING_ENDPOINT != '' }}

    steps:
      - name: Checkout tag
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 26.5.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run syntax and smoke tests
        run: npm run check

      - name: Build Windows installer
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Azure login (OIDC)
        if: env.SIGN_ENABLED == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}

      - name: Sign installer
        if: env.SIGN_ENABLED == 'true'
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          endpoint: ${{ secrets.AZURE_CODE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_TRUSTED_SIGNING_PROFILE_NAME }}
          files-folder: dist/
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: dist/*.exe
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: installer
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.1
        with:
          files: dist/*.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
