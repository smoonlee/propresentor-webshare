name: Release validated Dependabot updates

on:
  pull_request:
    branches: [main]
    types: [closed]

permissions:
  contents: write
  issues: write

jobs:
  release:
    # GitHub Actions updates deliberately do not produce application releases.
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      startsWith(github.event.pull_request.head.ref, 'dependabot/npm_and_yarn/')
    runs-on: windows-latest

    steps:
      - name: Checkout merged main branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '26'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run syntax and smoke tests
        run: npm run check

      - name: Bump patch version
        id: version
        shell: pwsh
        run: |
          npm version patch --no-git-tag-version
          $version = (node -p "require('./package.json').version")
          $date = (Get-Date).ToUniversalTime().ToString('yyyy-MM-dd')
          "version=$version" >> $env:GITHUB_OUTPUT
          "date=$date" >> $env:GITHUB_OUTPUT

      - name: Update changelog
        run: node scripts/update-changelog.js
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          RELEASE_DATE: ${{ steps.version.outputs.date }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}

      - name: Build Windows installer
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version and push release tag
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add CHANGELOG.md package.json package-lock.json
          git commit -m "chore: release v$version"
          git tag "v$version"
          git push origin main "v$version"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: dist/*.exe
          generate_release_notes: true

      - name: Create issue if release fails
        if: ${{ failure() }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const pr = context.payload.pull_request;
            const title = `Dependabot release failed for #${pr.number}`;
            const { data: issues } = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: 'open', labels: 'dependencies', per_page: 100 });
            if (issues.some((issue) => issue.title === title)) return;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              labels: ['dependencies', 'ci'],
              body: `@smoon_lee, the automated release for a merged Dependabot update failed.\n\nPull request: ${pr.html_url}\nFailed workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nPlease review the logs and release state before retrying.`,
            });
