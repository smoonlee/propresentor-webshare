<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WebShare — Live</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #frame-jpeg, #frame-h264 {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
    }
    #overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      color: #888;
      font: 16px/1.4 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      transition: opacity 0.4s;
      z-index: 10;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }
    #btn-fs {
      position: fixed;
      bottom: 16px; right: 16px;
      z-index: 20;
      width: 36px; height: 36px;
      border: none; border-radius: 6px;
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body:hover #btn-fs { opacity: 0.7; }
    #btn-fs:hover { opacity: 1 !important; background: rgba(255,255,255,0.25); }
    #btn-unmute {
      position: fixed;
      bottom: 16px; left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      padding: 8px 18px;
      border: none; border-radius: 6px;
      background: rgba(255,255,255,0.18);
      color: #fff;
      font: 13px/1 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      cursor: pointer;
      display: none;
    }
    #btn-unmute:hover { background: rgba(255,255,255,0.30); }
  </style>
</head>
<body>
  <img    id="frame-jpeg" alt="Waiting for stream…" />
  <video  id="frame-h264" autoplay muted playsinline></video>
  <audio  id="frame-audio" style="display:none" playsinline></audio>
  <div id="overlay">Waiting for stream…</div>
  <button id="btn-unmute" title="Enable audio">🔇 Tap to enable audio</button>
  <button id="btn-fs" title="Toggle fullscreen">⛶</button>

  <script>
    const frameJpeg  = document.getElementById('frame-jpeg');
    const frameH264  = document.getElementById('frame-h264');
    const frameAudio = document.getElementById('frame-audio');
    const overlay    = document.getElementById('overlay');
    const btnUnmute  = document.getElementById('btn-unmute');
    let reconnectDelay = 1000;
    let mode = null;
    let mediaSource = null;
    let sourceBuffer = null;
    let pendingChunks = [];
    let fatalError = false;

    // ── Audio loopback (HTTP chunked WebM streaming) ───────────────────────────
    // Using plain HTTP chunked transfer rather than WebSocket + MSE SourceBuffer.
    // The browser's native <audio> demuxer handles streaming WebM/Opus content
    // directly without requiring explicit SourceBuffer management.  This is far
    // more compatible across mobile browsers: the MSE path was causing immediate
    // SourceBuffer decode errors on Edge Android regardless of MIME type tried.
    const audioSupported = !!(frameAudio &&
      document.createElement('audio').canPlayType('audio/webm') !== '');
    let _audioConnected = false;
    let audioReconnectDelay = 2000;

    btnUnmute.addEventListener('click', () => {
      frameAudio.muted = false;
      // Re-call play() in case it was silently rejected by the browser's autoplay
      // policy before the user interacted.  A button click is always a valid user
      // gesture, so play() will succeed here even if the earlier call (while the
      // page was loading) was blocked.
      frameAudio.play().catch(() => {});
      btnUnmute.style.display = 'none';
    });

    function connectAudio() {
      if (_audioConnected || !audioSupported) return;
      _audioConnected = true;

      let done = false;
      function disconnect(reason) {
        if (done) return;
        done = true;
        _audioConnected = false;
        console.log('[Audio] HTTP stream', reason, '— reconnecting in', audioReconnectDelay, 'ms');
        frameAudio.pause();
        frameAudio.src = '';
        btnUnmute.style.display = 'none';
        setTimeout(connectAudio, audioReconnectDelay);
      }

      frameAudio.muted = true;
      // Show the unmute button as soon as the stream is usable.
      // canplay may never fire on mobile for live streams with unknown duration.
      // loadedmetadata fires as soon as the WebM init segment is parsed — reliable
      // on Edge Android.  Whichever fires first wins; the second call is harmless.
      const showUnmute = () => {
        console.log('[Audio] Stream ready — showing unmute button');
        btnUnmute.style.display = 'block';
      };
      frameAudio.addEventListener('loadedmetadata', showUnmute, { once: true });
      frameAudio.addEventListener('canplay',         showUnmute, { once: true });
      frameAudio.addEventListener('ended', () => disconnect('ended'), { once: true });
      frameAudio.addEventListener('error', () => {
        const code = frameAudio.error ? frameAudio.error.code : '?';
        console.log('[Audio] error code=' + code);
        disconnect('error(code=' + code + ')');
      }, { once: true });

      frameAudio.src = '/webshare/audio?t=' + Date.now();
      console.log('[Audio] Connecting via HTTP stream /webshare/audio');
      frameAudio.play().catch(() => {});
    }

    // ── Video stream (H.264 fragmented MP4 / JPEG via /webshare/ws) ──────────
    function connect() {
      if (fatalError) return;
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      const ws = new WebSocket(`${proto}://${location.host}/webshare/ws`);
      ws.binaryType = 'arraybuffer';
      let configured = false;

      ws.onopen = () => { reconnectDelay = 1000; };

      ws.onmessage = (e) => {
        // First message from server is always a JSON text config
        if (!configured && typeof e.data === 'string') {
          configured = true;
          try { setupMode(JSON.parse(e.data), ws); } catch (_) {}
          return;
        }
        if (mode === 'jpeg') {
          handleJpegFrame(e.data);
        } else if (mode === 'h264') {
          appendH264Chunk(new Uint8Array(e.data));
        }
      };

      ws.onclose = () => {
        if (fatalError) return;
        teardownH264();
        overlay.textContent = 'Disconnected — reconnecting…';
        overlay.classList.remove('hidden');
        setTimeout(connect, reconnectDelay);
        reconnectDelay = Math.min(reconnectDelay * 1.5, 10000);
      };

      ws.onerror = () => ws.close();
    }

    function setupMode(cfg, ws) {
      if (cfg.mode === 'jpeg') {
        mode = 'jpeg';
        frameJpeg.style.display = 'block';
        frameH264.style.display = 'none';
      } else if (cfg.mode === 'h264') {
        if (!window.MediaSource) {
          fatalError = true;
          overlay.textContent = 'Media Source Extensions are not supported in this browser. Ask the host to enable JPEG mode in Settings.';
          ws.close();
          return;
        }
        // Video is always video-only. If server sends a combined codec (older build),
        // strip the audio part — audio comes on the separate /webshare/ws-audio socket.
        const videoCodec = (cfg.codec || 'avc1.640028').split(',')[0].trim();
        const mimeType = `video/mp4; codecs="${videoCodec}"`;
        if (!MediaSource.isTypeSupported(mimeType)) {
          overlay.textContent = 'H.264 streaming is not supported in this browser. Ask the host to enable JPEG mode in Settings.';
          ws.close();
          return;
        }
        frameJpeg.style.display = 'none';
        frameH264.style.display = 'block';
        frameH264.muted = true; // video is always silent; audio is on frameAudio
        setupMSE(mimeType);
        mode = 'h264'; // must be set AFTER setupMSE — teardownH264 inside resets mode to null
      }
    }

    function handleJpegFrame(data) {
      const blob = new Blob([data], { type: 'image/jpeg' });
      const url = URL.createObjectURL(blob);
      const prev = frameJpeg.src;
      frameJpeg.src = url;
      overlay.classList.add('hidden');
      if (prev && prev.startsWith('blob:')) URL.revokeObjectURL(prev);
    }

    function setupMSE(mimeType) {
      teardownH264();
      pendingChunks = [];
      mediaSource = new MediaSource();
      frameH264.src = URL.createObjectURL(mediaSource);

      mediaSource.addEventListener('sourceopen', () => {
        try {
          sourceBuffer = mediaSource.addSourceBuffer(mimeType);
          sourceBuffer.mode = 'sequence';
        } catch (e) {
          console.error('[WebShare] addSourceBuffer failed:', e);
          return;
        }

        frameH264.play().catch(() => {}); // muted video always allowed to autoplay

        sourceBuffer.addEventListener('updateend', () => {
          trimBuffer();
          if (pendingChunks.length > 0 && !sourceBuffer.updating) {
            try { sourceBuffer.appendBuffer(pendingChunks.shift()); } catch (_) {}
          }
          overlay.classList.add('hidden');
        });

        if (pendingChunks.length > 0 && !sourceBuffer.updating) {
          try { sourceBuffer.appendBuffer(pendingChunks.shift()); } catch (_) {}
        }
      }, { once: true });
    }

    function appendH264Chunk(chunk) {
      if (!sourceBuffer || !mediaSource || mediaSource.readyState !== 'open') {
        if (pendingChunks.length >= 120) pendingChunks.shift();
        pendingChunks.push(chunk);
        return;
      }
      if (sourceBuffer.updating) { pendingChunks.push(chunk); return; }
      try {
        sourceBuffer.appendBuffer(chunk);
      } catch (_) {
        pendingChunks = [];
      }
    }

    function trimBuffer() {
      if (!sourceBuffer || sourceBuffer.updating || sourceBuffer.buffered.length === 0) return;
      const end   = sourceBuffer.buffered.end(0);
      const start = sourceBuffer.buffered.start(0);
      if (end - start > 5) {
        try { sourceBuffer.remove(start, end - 3); } catch (_) {}
      }
    }

    function teardownH264() {
      mode = null;
      pendingChunks = [];
      sourceBuffer = null;
      if (mediaSource && mediaSource.readyState === 'open') {
        try { mediaSource.endOfStream(); } catch (_) {}
      }
      mediaSource = null;
      if (frameH264.src && frameH264.src.startsWith('blob:')) {
        const old = frameH264.src;
        frameH264.src = '';
        URL.revokeObjectURL(old);
      }
    }

    connect();
    connectAudio();

    // Fullscreen toggle
    document.getElementById('btn-fs').addEventListener('click', () => {
      if (document.fullscreenElement) {
        document.exitFullscreen();
      } else {
        document.documentElement.requestFullscreen();
      }
    });
  </script>
</body>
</html>
