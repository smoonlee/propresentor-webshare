<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WebShare — Live</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #frame-jpeg, #frame-h264 {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
    }
    #overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      color: #888;
      font: 16px/1.4 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      transition: opacity 0.4s;
      z-index: 10;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }
    #btn-fs {
      position: fixed;
      bottom: 16px; right: 16px;
      z-index: 20;
      width: 36px; height: 36px;
      border: none; border-radius: 6px;
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body:hover #btn-fs { opacity: 0.7; }
    #btn-fs:hover { opacity: 1 !important; background: rgba(255,255,255,0.25); }
    #btn-unmute {
      position: fixed;
      bottom: 16px; left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      padding: 8px 18px;
      border: none; border-radius: 6px;
      background: rgba(255,255,255,0.18);
      color: #fff;
      font: 13px/1 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      cursor: pointer;
      display: none;
    }
    #btn-unmute:hover { background: rgba(255,255,255,0.30); }
  </style>
</head>
<body>
  <img    id="frame-jpeg" alt="Waiting for stream…" />
  <video  id="frame-h264" autoplay muted playsinline></video>
  <audio  id="frame-audio" style="display:none" playsinline></audio>
  <div id="overlay">Waiting for stream…</div>
  <button id="btn-unmute" title="Enable audio">🔇 Tap to enable audio</button>
  <button id="btn-fs" title="Toggle fullscreen">⛶</button>

  <script>
    const frameJpeg  = document.getElementById('frame-jpeg');
    const frameH264  = document.getElementById('frame-h264');
    const frameAudio = document.getElementById('frame-audio');
    const overlay    = document.getElementById('overlay');
    const btnUnmute  = document.getElementById('btn-unmute');
    let reconnectDelay = 1000;
    let mode = null;
    let mediaSource = null;
    let sourceBuffer = null;
    let pendingChunks = [];
    let fatalError = false;

    // ── Audio loopback (WebM/Opus via /webshare/ws-audio) ────────────────────
    const AUDIO_MIME = 'audio/webm;codecs=opus';
    const audioSupported = !!(window.MediaSource && MediaSource.isTypeSupported(AUDIO_MIME));
    let wsAudio = null;
    let audioMediaSource = null;
    let audioSourceBuffer = null;
    let audioPendingChunks = [];
    let audioHasData = false;
    let audioReconnectDelay = 5000;
    let _wsAudioChunkCount = 0;

    btnUnmute.addEventListener('click', () => {
      frameAudio.muted = false;
      frameAudio.play().catch(() => {});
      btnUnmute.style.display = 'none';
    });

    function setupAudioMSE() {
      teardownAudio();
      if (!audioSupported) return;
      audioMediaSource = new MediaSource();
      frameAudio.src = URL.createObjectURL(audioMediaSource);
      audioMediaSource.addEventListener('sourceopen', () => {
        try {
          audioSourceBuffer = audioMediaSource.addSourceBuffer(AUDIO_MIME);
          audioSourceBuffer.mode = 'sequence';
          console.log('[Audio] SourceBuffer created, MIME supported:', AUDIO_MIME);
        } catch (e) { console.error('[Audio] addSourceBuffer failed:', e); return; }
        audioSourceBuffer.addEventListener('error', () => {
          // MSE SourceBuffer decode/quota error — the buffer is now unusable.
          // Close the WebSocket so the onclose handler tears down MSE and
          // reconnects, giving us a fresh SourceBuffer + new init segment.
          console.warn('[Audio] SourceBuffer error — restarting audio pipeline');
          if (wsAudio) { try { wsAudio.close(4001, 'sourcebuffer-error'); } catch (_) {} }
        });
        audioSourceBuffer.addEventListener('abort', () => console.warn('[Audio] SourceBuffer aborted'));
        audioSourceBuffer.addEventListener('updateend', () => {
          if (!audioSourceBuffer || audioSourceBuffer.updating) return;
          // Trim buffered audio older than 10 s behind playhead to avoid quota overflow.
          // Do this in updateend (not updating) so we don't clash with an append.
          if (frameAudio.currentTime > 10 && audioSourceBuffer.buffered.length > 0) {
            const trimTo = frameAudio.currentTime - 8;
            if (trimTo > audioSourceBuffer.buffered.start(0) + 1) {
              try { audioSourceBuffer.remove(audioSourceBuffer.buffered.start(0), trimTo); return; } catch (_) {}
            }
          }
          if (audioPendingChunks.length > 0) {
            try { audioSourceBuffer.appendBuffer(audioPendingChunks.shift()); } catch (_) {}
          }
        });
        if (audioPendingChunks.length > 0 && !audioSourceBuffer.updating) {
          try { audioSourceBuffer.appendBuffer(audioPendingChunks.shift()); } catch (_) {}
        }
        frameAudio.muted = true; // start muted until user taps button
        frameAudio.play().catch(() => {});
      }, { once: true });
    }

    function appendAudioChunk(data) {
      if (!audioSourceBuffer || !audioMediaSource || audioMediaSource.readyState !== 'open') {
        if (audioPendingChunks.length < 30) audioPendingChunks.push(data);
        return;
      }
      if (!audioHasData) {
        audioHasData = true;
        console.log('[Audio] First chunk appended to SourceBuffer — showing unmute button');
        btnUnmute.style.display = 'block'; // first chunk: show unmute button
      }
      if (audioSourceBuffer.updating) { audioPendingChunks.push(data); return; }
      try { audioSourceBuffer.appendBuffer(data); }
      catch (_) { audioPendingChunks = []; }
    }

    function teardownAudio() {
      audioHasData = false;
      audioPendingChunks = [];
      audioSourceBuffer = null;
      btnUnmute.style.display = 'none';
      if (audioMediaSource && audioMediaSource.readyState === 'open') {
        try { audioMediaSource.endOfStream(); } catch (_) {}
      }
      audioMediaSource = null;
      if (frameAudio.src) { const old = frameAudio.src; frameAudio.src = ''; try { URL.revokeObjectURL(old); } catch (_) {} }
    }

    function connectAudio() {
      if (!audioSupported || wsAudio) return;
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      wsAudio = new WebSocket(`${proto}://${location.host}/webshare/ws-audio`);
      wsAudio.binaryType = 'arraybuffer';
      const t0 = Date.now();
      wsAudio.onopen = () => { console.log('[Audio] WebSocket /webshare/ws-audio connected'); audioReconnectDelay = 5000; _wsAudioChunkCount = 0; setupAudioMSE(); };
      wsAudio.onmessage = (e) => {
        if (!(e.data instanceof ArrayBuffer)) return;
        _wsAudioChunkCount++;
        if (_wsAudioChunkCount === 1) console.log('[Audio] First chunk from WebSocket, size:', e.data.byteLength);
        else if (_wsAudioChunkCount % 20 === 0) console.log('[Audio] Browser WebSocket chunk count:', _wsAudioChunkCount);
        appendAudioChunk(new Uint8Array(e.data));
      };
      wsAudio.onclose = (ev) => {
        console.log('[Audio] WebSocket /webshare/ws-audio closed, code:', ev.code, 'chunks received:', _wsAudioChunkCount);
        wsAudio = null; teardownAudio();
        // code 1001 = server-side stream restart; 4001 = local SourceBuffer error
        if (ev.code === 1001 || ev.code === 4001) {
          audioReconnectDelay = 1000;
        } else if (Date.now() - t0 < 1500) {
          audioReconnectDelay = Math.min(audioReconnectDelay * 2, 30000);
        } else {
          audioReconnectDelay = 5000;
        }
        setTimeout(connectAudio, audioReconnectDelay);
      };
      wsAudio.onerror = () => wsAudio.close();
    }

    // ── Video stream (H.264 fragmented MP4 / JPEG via /webshare/ws) ──────────
    function connect() {
      if (fatalError) return;
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      const ws = new WebSocket(`${proto}://${location.host}/webshare/ws`);
      ws.binaryType = 'arraybuffer';
      let configured = false;

      ws.onopen = () => { reconnectDelay = 1000; };

      ws.onmessage = (e) => {
        // First message from server is always a JSON text config
        if (!configured && typeof e.data === 'string') {
          configured = true;
          try { setupMode(JSON.parse(e.data), ws); } catch (_) {}
          return;
        }
        if (mode === 'jpeg') {
          handleJpegFrame(e.data);
        } else if (mode === 'h264') {
          appendH264Chunk(new Uint8Array(e.data));
        }
      };

      ws.onclose = () => {
        if (fatalError) return;
        teardownH264();
        overlay.textContent = 'Disconnected — reconnecting…';
        overlay.classList.remove('hidden');
        setTimeout(connect, reconnectDelay);
        reconnectDelay = Math.min(reconnectDelay * 1.5, 10000);
      };

      ws.onerror = () => ws.close();
    }

    function setupMode(cfg, ws) {
      if (cfg.mode === 'jpeg') {
        mode = 'jpeg';
        frameJpeg.style.display = 'block';
        frameH264.style.display = 'none';
      } else if (cfg.mode === 'h264') {
        if (!window.MediaSource) {
          fatalError = true;
          overlay.textContent = 'Media Source Extensions are not supported in this browser. Ask the host to enable JPEG mode in Settings.';
          ws.close();
          return;
        }
        // Video is always video-only. If server sends a combined codec (older build),
        // strip the audio part — audio comes on the separate /webshare/ws-audio socket.
        const videoCodec = (cfg.codec || 'avc1.640028').split(',')[0].trim();
        const mimeType = `video/mp4; codecs="${videoCodec}"`;
        if (!MediaSource.isTypeSupported(mimeType)) {
          overlay.textContent = 'H.264 streaming is not supported in this browser. Ask the host to enable JPEG mode in Settings.';
          ws.close();
          return;
        }
        frameJpeg.style.display = 'none';
        frameH264.style.display = 'block';
        frameH264.muted = true; // video is always silent; audio is on frameAudio
        setupMSE(mimeType);
        mode = 'h264'; // must be set AFTER setupMSE — teardownH264 inside resets mode to null
      }
    }

    function handleJpegFrame(data) {
      const blob = new Blob([data], { type: 'image/jpeg' });
      const url = URL.createObjectURL(blob);
      const prev = frameJpeg.src;
      frameJpeg.src = url;
      overlay.classList.add('hidden');
      if (prev && prev.startsWith('blob:')) URL.revokeObjectURL(prev);
    }

    function setupMSE(mimeType) {
      teardownH264();
      pendingChunks = [];
      mediaSource = new MediaSource();
      frameH264.src = URL.createObjectURL(mediaSource);

      mediaSource.addEventListener('sourceopen', () => {
        try {
          sourceBuffer = mediaSource.addSourceBuffer(mimeType);
          sourceBuffer.mode = 'sequence';
        } catch (e) {
          console.error('[WebShare] addSourceBuffer failed:', e);
          return;
        }

        frameH264.play().catch(() => {}); // muted video always allowed to autoplay

        sourceBuffer.addEventListener('updateend', () => {
          trimBuffer();
          if (pendingChunks.length > 0 && !sourceBuffer.updating) {
            try { sourceBuffer.appendBuffer(pendingChunks.shift()); } catch (_) {}
          }
          overlay.classList.add('hidden');
        });

        if (pendingChunks.length > 0 && !sourceBuffer.updating) {
          try { sourceBuffer.appendBuffer(pendingChunks.shift()); } catch (_) {}
        }
      }, { once: true });
    }

    function appendH264Chunk(chunk) {
      if (!sourceBuffer || !mediaSource || mediaSource.readyState !== 'open') {
        if (pendingChunks.length >= 120) pendingChunks.shift();
        pendingChunks.push(chunk);
        return;
      }
      if (sourceBuffer.updating) { pendingChunks.push(chunk); return; }
      try {
        sourceBuffer.appendBuffer(chunk);
      } catch (_) {
        pendingChunks = [];
      }
    }

    function trimBuffer() {
      if (!sourceBuffer || sourceBuffer.updating || sourceBuffer.buffered.length === 0) return;
      const end   = sourceBuffer.buffered.end(0);
      const start = sourceBuffer.buffered.start(0);
      if (end - start > 5) {
        try { sourceBuffer.remove(start, end - 3); } catch (_) {}
      }
    }

    function teardownH264() {
      mode = null;
      pendingChunks = [];
      sourceBuffer = null;
      if (mediaSource && mediaSource.readyState === 'open') {
        try { mediaSource.endOfStream(); } catch (_) {}
      }
      mediaSource = null;
      if (frameH264.src && frameH264.src.startsWith('blob:')) {
        const old = frameH264.src;
        frameH264.src = '';
        URL.revokeObjectURL(old);
      }
    }

    connect();
    connectAudio();

    // Fullscreen toggle
    document.getElementById('btn-fs').addEventListener('click', () => {
      if (document.fullscreenElement) {
        document.exitFullscreen();
      } else {
        document.documentElement.requestFullscreen();
      }
    });
  </script>
</body>
</html>
