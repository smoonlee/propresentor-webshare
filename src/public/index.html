<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WebShare — Live</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #frame {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    #overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      color: #888;
      font: 16px/1.4 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      transition: opacity 0.4s;
      z-index: 10;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }
    #btn-fs {
      position: fixed;
      bottom: 16px; right: 16px;
      z-index: 20;
      width: 36px; height: 36px;
      border: none; border-radius: 6px;
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body:hover #btn-fs { opacity: 0.7; }
    #btn-fs:hover { opacity: 1 !important; background: rgba(255,255,255,0.25); }
  </style>
</head>
<body>
  <img id="frame" alt="Waiting for stream…" />
  <div id="overlay">Waiting for stream…</div>
  <button id="btn-fs" title="Toggle fullscreen">⛶</button>

  <script>
    const frame = document.getElementById('frame');
    const overlay = document.getElementById('overlay');
    let reconnectDelay = 1000;

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      const ws = new WebSocket(`${proto}://${location.host}/webshare/ws`);
      ws.binaryType = 'arraybuffer';

      ws.onopen = () => {
        reconnectDelay = 1000;
      };

      ws.onmessage = (e) => {
        const blob = new Blob([e.data], { type: 'image/jpeg' });
        const url = URL.createObjectURL(blob);
        const prev = frame.src;
        frame.src = url;
        overlay.classList.add('hidden');
        // Free previous blob URL
        if (prev && prev.startsWith('blob:')) URL.revokeObjectURL(prev);
      };

      ws.onclose = () => {
        overlay.textContent = 'Disconnected — reconnecting…';
        overlay.classList.remove('hidden');
        setTimeout(connect, reconnectDelay);
        reconnectDelay = Math.min(reconnectDelay * 1.5, 10000);
      };

      ws.onerror = () => ws.close();
    }

    connect();

    // Fullscreen toggle
    document.getElementById('btn-fs').addEventListener('click', () => {
      if (document.fullscreenElement) {
        document.exitFullscreen();
      } else {
        document.documentElement.requestFullscreen();
      }
    });
  </script>
</body>
</html>
